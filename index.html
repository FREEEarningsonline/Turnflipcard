<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ace Pick - Original Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-btn: #eb4d4b; --green-btn: #6ab04c; --purple-header: #2d003e;
            --gold: #fbc531; --dark-blue: #1e549f; --white: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--dark-blue); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- Header --- */
        .header { background: var(--purple-header); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; z-index: 100; }
        .header .title { font-weight: 900; color: var(--gold); font-size: 20px; }
        .header .wallet { color: var(--gold); font-weight: bold; font-size: 14px; }
        .profile-btn { width: 35px; height: 35px; background: #3498db; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--gold); font-size: 18px; }

        /* --- Lobby Screen --- */
        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .lobby-card {
            background: #f0f7ff; width: 100%; max-width: 360px; border-radius: 40px; padding: 40px 20px;
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .main-title { font-size: 40px; font-weight: 900; line-height: 1.2; margin-bottom: 10px; }
        .main-title span:nth-child(odd) { color: #5d8ab9; } .main-title span:nth-child(even) { color: #8ec5e6; }
        .reward-text { font-size: 45px; font-weight: 900; color: #4b7bec; display: block; margin-bottom: 20px; }
        .badge { background: #f39c12; color: white; padding: 6px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 30px; display: inline-block; }
        
        .lobby-btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; color: white; margin-bottom: 15px; box-shadow: 0 6px #00000033; transition: 0.2s;
        }
        .btn-play { background: var(--red-btn); box-shadow: 0 6px #b33939; }

        /* --- Auth Modal --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px); }
        .auth-modal { background: #fff; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 20px; font-weight: bold; cursor: pointer; color: #333; }
        .input-box { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 10px; outline: none; }
        .profile-info { display: none; text-align: left; }

        /* --- Game Board --- */
        .game-container { background: #fff; width: 100%; height: 100%; position: relative; }
        .corner { position: absolute; width: 105px; height: 55px; background: #f1f2f6; border-radius: 8px; display: flex; align-items: center; padding: 5px; gap: 8px; border: 2px solid #dfe6e9; transition: 0.2s; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 16px; }
        .name { font-size: 10px; font-weight: 700; color: #2d3436; text-transform: uppercase; overflow: hidden; white-space: nowrap; width: 50px; }
        
        .spinning-now { border-color: #fbc531 !important; background: #fff9e6 !important; transform: scale(1.1); box-shadow: 0 0 15px #fbc531; z-index: 50; }
        .winner-active { border-color: #fbc531 !important; background: #fbc531 !important; transform: scale(1.15); box-shadow: 0 0 20px #fbc531; z-index: 60; }

        .top-left { top: 20px; left: 15px; border-left: 5px solid #00b894; }
        .top-right { top: 20px; right: 15px; border-right: 5px solid #0984e3; flex-direction: row-reverse; }
        .bottom-left { bottom: 120px; left: 15px; border-left: 5px solid #fbc531; }
        .bottom-right { bottom: 120px; right: 15px; border-right: 5px solid #d63031; flex-direction: row-reverse; }

        /* --- Realistic Card Styles --- */
        .board-center { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card-wrapper { width: 100px; height: 145px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; pointer-events: none; }
        .card.active { pointer-events: auto; }
        .card.flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .card-back { background: #2c3e50; border: 4px solid white; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #ffffff22; font-weight: bold; }
        
        .card-front { background: #fff; transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: space-between; padding: 5px; }
        .suit-corner { font-size: 16px; font-weight: bold; line-height: 1; text-align: left; }
        .suit-center { font-size: 55px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .suit-bottom { transform: rotate(180deg); font-size: 16px; font-weight: bold; line-height: 1; text-align: left; }

        .red-card { color: #ff0000; } 
        .black-card { color: #000000; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; color: white; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">Play & Earn</div>
        <div class="wallet" id="wallet-display">Login Required</div>
        <div class="profile-btn" id="profile-trigger">👤</div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="auth-modal">
            <span class="close-modal" id="close-modal">&times;</span>
            <div id="auth-form">
                <h2 id="auth-title">Welcome</h2>
                <div id="signup-fields"><input type="text" id="username" class="input-box" placeholder="Nickname"></div>
                <input type="email" id="email" class="input-box" placeholder="Email Address">
                <input type="password" id="password" class="input-box" placeholder="Password">
                <button class="lobby-btn btn-play" id="auth-btn" style="box-shadow:none;">Confirm</button>
                <p style="margin-top:15px; font-size:14px; cursor:pointer;" onclick="toggleAuthUI()">Don't have account? <span style="color:#3498db;">Sign Up</span></p>
            </div>
            <div id="profile-info" class="profile-info">
                <h3>My Account</h3>
                <p>User: <b id="prof-user"></b></p>
                <p>Email: <b id="prof-email"></b></p>
                <p>Wallet: <b id="prof-balance"></b> PKR</p>
                <button class="lobby-btn" style="background:#e67e22; margin-top:20px;" id="logout-btn">Logout</button>
            </div>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="lobby-card">
            <h1 class="main-title"><span>P</span><span>L</span><span>A</span><span>Y</span> & <span>W</span><span>I</span><span>N</span></h1>
            <span class="reward-text">1000PKR</span>
            <div class="badge">★ Earn PKR by Beating AI ★</div>
            <button class="lobby-btn btn-play" id="main-play-btn">🤖 PLAY VS CPU (BET PKR 75)</button>
        </div>
    </div>

    <div id="game-board" class="screen hidden" style="padding:0;">
        <div class="game-container">
            <div class="corner top-left" id="corner-0"><div class="avatar" style="background:#00b894;" id="av-0">G</div><div class="name" id="name-0">CPU</div></div>
            <div class="corner top-right" id="corner-1"><div class="avatar" style="background:#0984e3;" id="av-1">B</div><div class="name" id="name-1">CPU</div></div>
            <div class="corner bottom-left" id="corner-2"><div class="avatar" style="background:#fbc531;" id="av-2">Y</div><div class="name" id="name-2">CPU</div></div>
            <div class="corner bottom-right" id="corner-3"><div class="avatar" style="background:#d63031;" id="av-user">U</div><div class="name" id="user-display">YOU</div></div>

            <div class="board-center">
                <div class="card-wrapper" onclick="startSpinSequence(0)"><div class="card" id="card-0"><div class="card-face card-back">?</div><div class="card-front"><div class="suit-corner"></div><div class="suit-center"></div><div class="suit-bottom"></div></div></div></div>
                <div class="card-wrapper" onclick="startSpinSequence(1)"><div class="card" id="card-1"><div class="card-face card-back">?</div><div class="card-front"><div class="suit-corner"></div><div class="suit-center"></div><div class="suit-bottom"></div></div></div></div>
                <div class="card-wrapper" onclick="startSpinSequence(2)"><div class="card" id="card-2"><div class="card-face card-back">?</div><div class="card-front"><div class="suit-corner"></div><div class="suit-center"></div><div class="suit-bottom"></div></div></div></div>
                <div class="card-wrapper" onclick="startSpinSequence(3)"><div class="card" id="card-3"><div class="card-face card-back">?</div><div class="card-front"><div class="suit-corner"></div><div class="suit-center"></div><div class="suit-bottom"></div></div></div></div>
            </div>
        </div>
    </div>

    <div class="overlay" id="result-screen">
        <h2 style="font-size:40px; font-weight:900; color:var(--gold);">ROUND OVER</h2>
        <p id="winner-info" style="margin:20px 0; font-size:20px; font-weight:bold;"></p>
        <button class="lobby-btn btn-play" style="width:200px; box-shadow:none;" onclick="backToLobby()">Back to Lobby</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
